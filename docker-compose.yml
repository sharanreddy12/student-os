version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: studentos-postgres
    environment:
      POSTGRES_USER: studentos
      POSTGRES_PASSWORD: sharan@12300
      POSTGRES_DB: studentos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studentos-backend
    environment:
      DATABASE_URL: postgresql://studentos:sharan@12300@postgres:5432/studentos
      JWT_SECRET: your-secret-key-change-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
